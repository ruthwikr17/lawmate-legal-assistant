# Spring Boot Configuration
spring.application.name=ALRS-backend
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Database Configuration (Defaults to Zero-Setup in-memory H2 locally)
# In production (e.g. Render), simply set DB_URL, DB_USERNAME, DB_PASSWORD, DB_DRIVER in Env Vars.
spring.datasource.url=${DB_URL:jdbc:h2:mem:ALRS;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# AI Python Service Configuration (Defaults to local FastAPI, overridable for Hugging Face Spaces)
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
