# Spring Boot Configuration
spring.application.name=lawmate-backend
server.port=8080

# Database Configuration (Switching to Zero-Setup H2 for immediate use)
# To use PostgreSQL later, comment these and uncomment the Postgres section below.
spring.datasource.url=jdbc:h2:mem:lawmate;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# AI Service Configuration
ai.service.url=http://localhost:8000

